name: .NET Build and Publish NuGet Package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GHOSTCURSORSHARP_BROWSER_CACHE_PATH: ${{ github.workspace }}/.browser
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Cache browser download
      uses: actions/cache@v4
      with:
        path: ${{ env.GHOSTCURSORSHARP_BROWSER_CACHE_PATH }}
        key: ${{ runner.os }}-ghostcursorsharp-browser-${{ hashFiles('tests/GhostCursorSharp.Tests/GhostCursorIntegrationTests.cs') }}
        restore-keys: |
          ${{ runner.os }}-ghostcursorsharp-browser-

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: ${{ runner.os }}-ghostcursorsharp-playwright-${{ hashFiles('tests/GhostCursorSharp.Tests/GhostCursorIntegrationTests.cs', 'tests/GhostCursorSharp.Tests/GhostCursorSharp.Tests.csproj') }}
        restore-keys: |
          ${{ runner.os }}-ghostcursorsharp-playwright-

    - name: Restore
      run: dotnet restore GhostCursorSharp.slnx

    - name: Build
      run: dotnet build GhostCursorSharp.slnx --configuration Release --no-restore

    - name: Install Playwright browsers
      run: pwsh tests/GhostCursorSharp.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium firefox

    - name: Test
      run: dotnet test GhostCursorSharp.slnx --configuration Release --no-build

    # Don't override the version of the package; trust the version in the project file.
    - name: Create NuGet Packages
      run: |
        dotnet pack src/GhostCursorSharp.Core/GhostCursorSharp.csproj --output nupkgs --configuration Release --no-build
        dotnet pack src/GhostCursorSharp.Puppeteer/GhostCursorSharp.Puppeteer.csproj --output nupkgs --configuration Release --no-build
        dotnet pack src/GhostCursorSharp.Playwright/GhostCursorSharp.Playwright.csproj --output nupkgs --configuration Release --no-build

    - name: Upload NuGet Package
      run: dotnet nuget push "nupkgs/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
