name: .NET CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GHOSTCURSORSHARP_BROWSER_CACHE_PATH: ${{ github.workspace }}/.browser

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        cache: true

    - name: Cache browser download
      uses: actions/cache@v4
      with:
        path: ${{ env.GHOSTCURSORSHARP_BROWSER_CACHE_PATH }}
        key: ${{ runner.os }}-ghostcursorsharp-browser-${{ hashFiles('tests/GhostCursorSharp.Tests/GhostCursorIntegrationTests.cs') }}
        restore-keys: |
          ${{ runner.os }}-ghostcursorsharp-browser-

    - name: Restore
      run: dotnet restore GhostCursorSharp.slnx

    - name: Verify formatting
      run: dotnet format GhostCursorSharp.slnx --verify-no-changes

    - name: Build
      run: dotnet build GhostCursorSharp.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test GhostCursorSharp.slnx --configuration Release --no-build
