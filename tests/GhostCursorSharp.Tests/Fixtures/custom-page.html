<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostCursorSharp Test Page</title>
  <style>
    .box {
      background: #eee;
      transition: all 0.4s;
      width: 50px;
      height: 50px;
      position: absolute;
    }
  </style>
</head>
<body>
  <div id="box1" class="box" style="left: 200px; top: 40px;">Box 1</div>
  <div id="box2" class="box" style="left: 200px; top: 3000px;">Box 2</div>
  <div id="box3" class="box" style="left: 3000px; top: 5000px;">Box 3</div>
</body>
<script>
  const box = document.querySelector('#box1');
  window.boxWasClicked = false;
  box.addEventListener('click', () => {
    window.boxWasClicked = true;
  });
</script>
</html>
